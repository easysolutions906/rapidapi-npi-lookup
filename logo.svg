<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <rect width="500" height="500" rx="60" fill="#1e3a5f"/>
  <!-- Person silhouette (head) -->
  <circle cx="210" cy="140" r="50" fill="#ffffff"/>
  <!-- Person silhouette (body) -->
  <path d="M130,310 C130,240 150,220 210,220 C270,220 290,240 290,310Z" fill="#ffffff"/>
  <!-- ID Badge -->
  <rect x="290" y="150" width="110" height="150" rx="12" fill="none" stroke="#ffffff" stroke-width="14"/>
  <!-- Badge lines -->
  <line x1="315" y1="200" x2="375" y2="200" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="315" y1="230" x2="375" y2="230" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="315" y1="260" x2="355" y2="260" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <!-- Badge clip -->
  <rect x="330" y="140" width="30" height="20" rx="4" fill="#ffffff"/>
  <text x="250" y="430" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="48" fill="#ffffff">NPI</text>
</svg>